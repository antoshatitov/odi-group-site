name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - ".env.example"
      - ".gitignore"
      - "README.md"
      - "SECURITY.md"
      - "apps/web/**"
      - "apps/server/**"
      - "deploy/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

jobs:
  repo-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run repository safety checks
        run: npm run repo:safety
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run server tests
        run: npm run test:server

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint web
        run: npm run lint:web
      - name: Build web
        run: npm run build:web
      - name: Check perf budgets
        run: npm --workspace apps/web run perf-check
      - name: Check media budgets
        run: npm --workspace apps/web run media-check
      - name: Install Playwright browser
        run: npm --workspace apps/web run playwright:install:ci
      - name: Run Playwright smoke
        run: |
          npm --workspace apps/web run preview -- --host 127.0.0.1 --port 4173 &
          PREVIEW_PID=$!
          trap "kill $PREVIEW_PID" EXIT
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          E2E_BASE_URL=http://127.0.0.1:4173 npm --workspace apps/web run e2e:smoke
